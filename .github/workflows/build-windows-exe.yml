name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pypdf2

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
        echo "version=$tag" >> $env:GITHUB_OUTPUT
        echo "Version: $tag"

    - name: Build executable with PyInstaller
      shell: pwsh
      run: |
        pyinstaller pdf_merger.spec

    - name: Create release directory
      shell: pwsh
      run: |
        $releaseDir = "pdf_merger_${{ steps.version.outputs.version }}_windows"
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        New-Item -ItemType Directory -Path "$releaseDir/in" -Force | Out-Null
        New-Item -ItemType Directory -Path "$releaseDir/out" -Force | Out-Null
        Copy-Item -Path "dist/pdf_merger.exe" -Destination "$releaseDir/"
        Copy-Item -Path "README.md" -Destination "$releaseDir/"
        Copy-Item -Path "CHANGELOG.md" -Destination "$releaseDir/"
        Copy-Item -Path "LICENSE" -Destination "$releaseDir/"
        Copy-Item -Path "Pipfile" -Destination "$releaseDir/"
        
        Write-Output "Release directory created at $releaseDir"

    - name: Create ZIP archive
      shell: pwsh
      run: |
        $releaseDir = "pdf_merger_${{ steps.version.outputs.version }}_windows"
        $zipFile = "$releaseDir.zip"
        Compress-Archive -Path $releaseDir -DestinationPath $zipFile -Force
        Write-Output "Created: $zipFile"
        Get-ChildItem $zipFile

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          pdf_merger_${{ steps.version.outputs.version }}_windows.zip
          pdf_merger_${{ steps.version.outputs.version }}_windows/pdf_merger.exe
        draft: false
        prerelease: false
        body: |
          # PDF Merger ${{ steps.version.outputs.version }}

          ## Download

          - **pdf_merger.exe** - Standalone executable (recommended for most users)
          - **pdf_merger_${{ steps.version.outputs.version }}_windows.zip** - Complete package with documentation

          ## Installation

          ### Option 1: Standalone EXE (Easiest)
          1. Download `pdf_merger.exe`
          2. Create `in` and `out` folders in the same directory
          3. Run the exe

          ### Option 2: Full Package
          1. Download and extract the ZIP file
          2. Place PDF files in the `in` folder
          3. Run `pdf_merger.exe`

          ## What's New

          See CHANGELOG.md for detailed changes in this release.

          ## System Requirements

          - Windows 7 or later
          - No additional software required
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: pdf_merger-${{ steps.version.outputs.version }}-windows
        path: |
          pdf_merger_${{ steps.version.outputs.version }}_windows/
          dist/pdf_merger.exe
        retention-days: 30
