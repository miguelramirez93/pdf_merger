name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pypdf2

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $tag = "${{ github.ref }}" -replace 'refs/tags/', ''
        echo "version=$tag" >> $env:GITHUB_OUTPUT
        echo "Version: $tag"

    - name: Build executable with PyInstaller
      shell: pwsh
      run: |
        pyinstaller pdf_merger.spec

    - name: Create release directory
      shell: pwsh
      run: |
        $releaseDir = "pdf_merger_${{ steps.version.outputs.version }}_windows"
        New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
        New-Item -ItemType Directory -Path "$releaseDir/in" -Force | Out-Null
        New-Item -ItemType Directory -Path "$releaseDir/out" -Force | Out-Null
        Copy-Item -Path "dist/pdf_merger.exe" -Destination "$releaseDir/"
        Copy-Item -Path "README.md" -Destination "$releaseDir/"
        Copy-Item -Path "CHANGELOG.md" -Destination "$releaseDir/"
        Copy-Item -Path "LICENSE" -Destination "$releaseDir/"
        Copy-Item -Path "Pipfile" -Destination "$releaseDir/"
        
        Write-Output "Release directory created at $releaseDir"

    - name: Create ZIP archive
      shell: pwsh
      run: |
        $releaseDir = "pdf_merger_${{ steps.version.outputs.version }}_windows"
        $zipFile = "$releaseDir.zip"
        Compress-Archive -Path $releaseDir -DestinationPath $zipFile -Force
        Write-Output "Created: $zipFile"
        Get-ChildItem $zipFile

    - name: Create GitHub Release with Files
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.version }}"
        $zipFile = "pdf_merger_${version}_windows.zip"
        $exeFile = "pdf_merger_${version}_windows/pdf_merger.exe"
        
        Write-Output "Release artifacts ready for v$version"
        Write-Output "Files:"
        Get-ChildItem $zipFile -ErrorAction SilentlyContinue | ForEach-Object { Write-Output "  - $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)" }
        Get-ChildItem $exeFile -ErrorAction SilentlyContinue | ForEach-Object { Write-Output "  - $($_.Name) ($([math]::Round($_.Length / 1MB, 2)) MB)" }
        Write-Output ""
        Write-Output "To create a GitHub release, run:"
        Write-Output "  gh release create $version $zipFile $exeFile --title 'PDF Merger $version' --notes 'See CHANGELOG.md for details'"

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pdf_merger-${{ steps.version.outputs.version }}-windows
        path: pdf_merger_${{ steps.version.outputs.version }}_windows/
        retention-days: 30
